<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💣 Bomb Party - Game Kata Multiplayer</title>
  <meta name="description" content="Bomb Party - Game kata multiplayer real-time. Ketik kata sebelum bom meledak!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <!-- ===== PARTICLES BG ===== -->
    <canvas id="particles-bg"></canvas>

    <!-- ===== SCREEN: HOME ===== -->
    <div class="screen active" id="screen-home">
      <div class="home-container">
        <div class="logo-section">
          <div class="bomb-logo">💣</div>
          <h1 class="logo-text">BOMB<span>PARTY</span></h1>
          <p class="logo-sub">Ketik kata sebelum bom meledak!</p>
        </div>

        <div class="card glass">
          <div class="input-group">
            <label for="player-name">Nama Kamu</label>
            <input type="text" id="player-name" placeholder="Masukkan nama..." maxlength="15" autocomplete="off">
          </div>

          <div class="avatar-picker">
            <label>Pilih Avatar</label>
            <div class="avatar-grid" id="avatar-grid">
              <button class="avatar-btn selected" data-avatar="😎">😎</button>
              <button class="avatar-btn" data-avatar="🤡">🤡</button>
              <button class="avatar-btn" data-avatar="👻">👻</button>
              <button class="avatar-btn" data-avatar="🦊">🦊</button>
              <button class="avatar-btn" data-avatar="🐸">🐸</button>
              <button class="avatar-btn" data-avatar="🦄">🦄</button>
              <button class="avatar-btn" data-avatar="🐱">🐱</button>
              <button class="avatar-btn" data-avatar="🐻">🐻</button>
              <button class="avatar-btn" data-avatar="🎃">🎃</button>
              <button class="avatar-btn" data-avatar="👽">👽</button>
              <button class="avatar-btn" data-avatar="🤖">🤖</button>
              <button class="avatar-btn" data-avatar="💀">💀</button>
            </div>
          </div>

          <div class="home-actions">
            <button class="btn btn-primary btn-glow" id="btn-create">
              <span class="btn-icon">🎮</span> Buat Room
            </button>
            <div class="divider"><span>atau</span></div>
            <div class="join-section">
              <input type="text" id="room-code-input" placeholder="Kode Room" maxlength="4" autocomplete="off" style="text-transform:uppercase">
              <button class="btn btn-secondary" id="btn-join">Gabung</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== SCREEN: LOBBY ===== -->
    <div class="screen" id="screen-lobby">
      <div class="lobby-container">
        <div class="lobby-header">
          <button class="btn-back" id="btn-back-lobby">←</button>
          <div class="room-badge">
            <span class="room-label">ROOM</span>
            <span class="room-code" id="lobby-room-code">XXXX</span>
            <button class="btn-copy" id="btn-copy-code" title="Salin kode">📋</button>
          </div>
        </div>

        <div class="lobby-content">
          <h2 class="lobby-title">Menunggu Pemain...</h2>
          <div class="players-grid" id="lobby-players"></div>
          <div class="lobby-info">
            <span id="player-count">0/8 Pemain</span>
          </div>
        </div>

        <div class="lobby-footer">
          <button class="btn btn-primary btn-glow btn-large" id="btn-start" style="display:none">
            🚀 Mulai Game!
          </button>
          <p class="wait-text" id="wait-text">Menunggu host memulai game...</p>
        </div>
      </div>
    </div>

    <!-- ===== SCREEN: GAME ===== -->
    <div class="screen" id="screen-game">
      <div class="game-container">
        <div class="game-top-bar">
          <div class="round-badge">Ronde <span id="game-round">1</span></div>
          <div class="words-used">📝 <span id="words-used-count">0</span></div>
        </div>

        <div class="player-circle-area" id="player-circle-area"></div>

        <div class="bomb-section">
          <div class="bomb-wrapper" id="bomb-wrapper">
            <svg class="bomb-timer-ring" viewBox="0 0 120 120">
              <circle class="ring-bg" cx="60" cy="60" r="54"/>
              <circle class="ring-progress" id="ring-progress" cx="60" cy="60" r="54"/>
            </svg>
            <div class="bomb-icon" id="bomb-icon">💣</div>
          </div>
          <div class="current-letters" id="current-letters">AN</div>
          <div class="turn-indicator" id="turn-indicator">Giliran kamu!</div>
        </div>

        <div class="input-section" id="input-section">
          <div class="word-input-wrapper">
            <input type="text" id="word-input" placeholder="Ketik kata..." autocomplete="off" autocapitalize="off" autocorrect="off">
            <button class="btn-submit" id="btn-submit">➤</button>
          </div>
          <div class="input-feedback" id="input-feedback"></div>
        </div>

        <div class="reaction-bar">
          <button class="reaction-btn" data-emoji="😂">😂</button>
          <button class="reaction-btn" data-emoji="😱">😱</button>
          <button class="reaction-btn" data-emoji="🔥">🔥</button>
          <button class="reaction-btn" data-emoji="💀">💀</button>
          <button class="reaction-btn" data-emoji="👏">👏</button>
        </div>
      </div>

      <!-- Explosion overlay -->
      <div class="explosion-overlay" id="explosion-overlay">
        <div class="explosion-text" id="explosion-text">💥 BOOM!</div>
        <div class="explosion-victim" id="explosion-victim"></div>
      </div>
    </div>

    <!-- ===== SCREEN: RESULTS ===== -->
    <div class="screen" id="screen-results">
      <div class="results-container">
        <div class="confetti-container" id="confetti-container"></div>
        <div class="winner-section">
          <div class="winner-crown">👑</div>
          <div class="winner-avatar" id="winner-avatar">😎</div>
          <h2 class="winner-name" id="winner-name">Player</h2>
          <p class="winner-label">PEMENANG!</p>
        </div>
        <div class="scoreboard card glass" id="scoreboard"></div>
        <div class="results-actions">
          <button class="btn btn-primary btn-glow" id="btn-play-again" style="display:none">🔄 Main Lagi</button>
          <button class="btn btn-secondary" id="btn-back-home">🏠 Kembali</button>
        </div>
      </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ===== FLOATING REACTIONS ===== -->
    <div class="floating-reactions" id="floating-reactions"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
